services:
  - type: web
    name: yupay-finance-backend
    runtime: node
    buildCommand: "npm install && npm run prisma:generate && npm run build"
    startCommand: "npm run prisma:deploy && npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false # Debe ser configurado en el Dashboard de Render
      - key: JWT_SECRET
        generateValue: true # Genera un secreto aleatorio y seguro automáticamente en Render
